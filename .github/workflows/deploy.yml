name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Creates/enables the Pages site on first run (build_type: workflow).
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # npm install (not ci): the lockfile isn't in the repo yet — it was
      # bootstrapped via the GitHub API, which can't carry the 46KB lockfile
      # reliably. Push package-lock.json + switch back to `npm ci` once a
      # normal git push is possible.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
